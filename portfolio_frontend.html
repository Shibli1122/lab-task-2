<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio — 3-Tier App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #7c6af7;
      --accent2: #f7a26a;
      --text: #e8e8f0;
      --muted: #666680;
      --card: #13131c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.3rem;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 8rem 3rem 4rem;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: -20%; right: -10%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,106,247,0.12), transparent 70%);
      pointer-events: none;
    }
    .hero-tag {
      font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 1.5rem;
      border: 1px solid rgba(124,106,247,0.3);
      padding: 0.3rem 0.8rem; border-radius: 2px; display: inline-block;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 800; line-height: 1.0;
      margin-bottom: 1.5rem;
    }
    .hero h1 span { color: var(--accent); }
    .hero p {
      font-size: 1rem; color: var(--muted);
      max-width: 520px; line-height: 1.7; margin-bottom: 2.5rem;
    }
    .hero-btns { display: flex; gap: 1rem; }
    .btn-primary {
      background: var(--accent); color: #fff;
      border: none; padding: 0.85rem 2rem;
      font-family: 'DM Mono', monospace; font-size: 0.85rem;
      cursor: pointer; border-radius: 4px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-2px); }
    .btn-ghost {
      background: transparent; color: var(--text);
      border: 1px solid var(--border); padding: 0.85rem 2rem;
      font-family: 'DM Mono', monospace; font-size: 0.85rem;
      cursor: pointer; border-radius: 4px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .btn-ghost:hover { border-color: var(--accent); transform: translateY(-2px); }

    /* ── SECTIONS ── */
    section {
      padding: 5rem 3rem;
      max-width: 1100px; margin: 0 auto;
    }
    .section-label {
      font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--accent2); margin-bottom: 0.5rem;
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700; margin-bottom: 3rem;
    }

    /* ── PROJECTS GRID ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .project-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 1.8rem;
      transition: border-color 0.2s, transform 0.2s;
      position: relative; overflow: hidden;
    }
    .project-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.3s;
    }
    .project-card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .project-card:hover::before { transform: scaleX(1); }
    .project-card h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem; margin-bottom: 0.6rem;
    }
    .project-card p { color: var(--muted); font-size: 0.82rem; line-height: 1.6; margin-bottom: 1rem; }
    .tech-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .tech-tag {
      font-size: 0.68rem; padding: 0.2rem 0.5rem;
      background: rgba(124,106,247,0.12); color: var(--accent);
      border: 1px solid rgba(124,106,247,0.2); border-radius: 2px;
    }
    .card-links { display: flex; gap: 1rem; }
    .card-links a {
      font-size: 0.75rem; color: var(--muted); text-decoration: none;
      letter-spacing: 0.05em; transition: color 0.2s;
    }
    .card-links a:hover { color: var(--accent); }

    /* ── SKILLS ── */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .skill-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; padding: 1.2rem 1.5rem;
    }
    .skill-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 0.6rem;
    }
    .skill-name { font-size: 0.85rem; font-weight: 500; }
    .skill-pct { font-size: 0.75rem; color: var(--accent2); }
    .skill-bar {
      height: 3px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .skill-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 1s ease;
    }
    .skill-category {
      font-size: 0.65rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }

    /* ── CONTACT ── */
    .contact-wrapper {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;
    }
    .contact-info h3 {
      font-family: 'Syne', sans-serif; font-size: 1.4rem; margin-bottom: 1rem;
    }
    .contact-info p { color: var(--muted); line-height: 1.7; font-size: 0.85rem; }
    .contact-form { display: flex; flex-direction: column; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .form-group input,
    .form-group textarea {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.85rem;
      padding: 0.8rem 1rem; border-radius: 4px; outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .success-msg {
      color: #6af79e; font-size: 0.8rem; padding: 0.8rem;
      background: rgba(106,247,158,0.08); border: 1px solid rgba(106,247,158,0.2);
      border-radius: 4px;
    }

    /* ── ARCH BADGE ── */
    .arch-banner {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 1.5rem 3rem;
      display: flex; gap: 2rem; align-items: center;
      font-size: 0.75rem; color: var(--muted);
    }
    .arch-item { display: flex; align-items: center; gap: 0.5rem; }
    .arch-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .dot-frontend { background: #7c6af7; }
    .dot-backend  { background: #f7a26a; }
    .dot-database { background: #6af79e; }

    /* ── LOADING ── */
    .loading { color: var(--muted); font-size: 0.8rem; padding: 2rem 0; }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 2rem;
      color: var(--muted); font-size: 0.75rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 700px) {
      nav { padding: 1rem 1.5rem; }
      .hero { padding: 7rem 1.5rem 3rem; }
      section { padding: 4rem 1.5rem; }
      .contact-wrapper { grid-template-columns: 1fr; gap: 2rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── MOCK DATA (used when backend is not running) ──
    const MOCK_PROJECTS = [
      { id:1, title:"E-Commerce Platform", description:"Full-stack shopping app with cart, auth, and payments.", tech_stack:["React","Node.js","PostgreSQL"], github_url:"#", live_url:"#" },
      { id:2, title:"AI Chat Dashboard", description:"Real-time dashboard for monitoring AI conversations.", tech_stack:["React","Python","WebSockets"], github_url:"#", live_url:"#" },
      { id:3, title:"Portfolio CMS", description:"A headless CMS built for developers.", tech_stack:["Next.js","PostgreSQL","REST API"], github_url:"#", live_url:"#" },
      { id:4, title:"Weather Analytics", description:"Data visualization for historical weather patterns.", tech_stack:["D3.js","Flask","PostgreSQL"], github_url:"#", live_url:"#" },
    ];
    const MOCK_SKILLS = [
      { id:1,name:"React",category:"Frontend",level:90 }, { id:2,name:"Node.js",category:"Backend",level:85 },
      { id:3,name:"Python",category:"Backend",level:88 }, { id:4,name:"TypeScript",category:"Frontend",level:82 },
      { id:5,name:"PostgreSQL",category:"Database",level:78 }, { id:6,name:"PostgreSQL",category:"Database",level:85 },
      { id:7,name:"Docker",category:"DevOps",level:70 }, { id:8,name:"REST APIs",category:"Backend",level:92 },
    ];

    const API = "http://" + window.location.hostname + ":5000/api";

    async function apiFetch(path) {
      try {
        const res = await fetch(API + path);
        return await res.json();
      } catch { return null; }
    }

    // ── NAV ──
    function Nav({ active, setActive }) {
      return (
        <nav>
          <div className="logo">{"<Dev />"}</div>
          <div className="nav-links">
            {["hero","projects","skills","contact"].map(s => (
              <a key={s} className={active===s?"active":""} onClick={()=>setActive(s)}>
                {s}
              </a>
            ))}
          </div>
        </nav>
      );
    }

    // ── HERO ──
    function Hero({ setActive }) {
      return (
        <div className="hero" id="hero">
          <span className="hero-tag">// available for hire</span>
          <h1>Alex <span>Rivera</span><br/>Full-Stack Dev</h1>
          <p>Building high-performance web applications with modern stacks. React on the front, Node.js in the middle, Python powering the data.</p>
          <div className="hero-btns">
            <button className="btn-primary" onClick={()=>setActive("projects")}>View Projects</button>
            <button className="btn-ghost" onClick={()=>setActive("contact")}>Get In Touch</button>
          </div>
        </div>
      );
    }

    // ── PROJECTS ──
    function Projects() {
      const [projects, setProjects] = useState(null);
      useEffect(() => {
        apiFetch("/projects").then(data => {
          if (data && Array.isArray(data)) {
            setProjects(data.map(p => ({
              ...p,
              tech_stack: typeof p.tech_stack === "string" ? JSON.parse(p.tech_stack) : p.tech_stack
            })));
          } else {
            setProjects(MOCK_PROJECTS);
          }
        });
      }, []);

      return (
        <section id="projects">
          <div className="section-label">// 01 — work</div>
          <h2 className="section-title">Selected Projects</h2>
          {!projects ? <div className="loading">Loading from database...</div> : (
            <div className="projects-grid">
              {projects.map(p => (
                <div className="project-card" key={p.id}>
                  <h3>{p.title}</h3>
                  <p>{p.description}</p>
                  <div className="tech-tags">
                    {(p.tech_stack||[]).map(t => <span key={t} className="tech-tag">{t}</span>)}
                  </div>
                  <div className="card-links">
                    <a href={p.github_url} target="_blank">GitHub ↗</a>
                    <a href={p.live_url} target="_blank">Live Demo ↗</a>
                  </div>
                </div>
              ))}
            </div>
          )}
        </section>
      );
    }

    // ── SKILLS ──
    function Skills() {
      const [skills, setSkills] = useState(null);
      useEffect(() => {
        apiFetch("/skills").then(data => setSkills(data || MOCK_SKILLS));
      }, []);

      const grouped = skills ? skills.reduce((acc, s) => {
        acc[s.category] = acc[s.category] || [];
        acc[s.category].push(s);
        return acc;
      }, {}) : {};

      return (
        <section id="skills" style={{background:"var(--surface)", maxWidth:"100%", borderTop:"1px solid var(--border)", borderBottom:"1px solid var(--border)"}}>
          <div style={{maxWidth:1100, margin:"0 auto"}}>
            <div className="section-label">// 02 — expertise</div>
            <h2 className="section-title">Skills & Tools</h2>
            {!skills ? <div className="loading">Fetching from backend...</div> : (
              Object.entries(grouped).map(([cat, items]) => (
                <div key={cat} style={{marginBottom:"2rem"}}>
                  <div style={{fontSize:"0.7rem",color:"var(--accent2)",textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:"1rem"}}>{cat}</div>
                  <div className="skills-grid">
                    {items.map(s => (
                      <div className="skill-item" key={s.id}>
                        <div className="skill-header">
                          <span className="skill-name">{s.name}</span>
                          <span className="skill-pct">{s.level}%</span>
                        </div>
                        <div className="skill-bar">
                          <div className="skill-fill" style={{width: s.level + "%"}}></div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))
            )}
          </div>
        </section>
      );
    }

    // ── CONTACT ──
    function Contact() {
      const [form, setForm] = useState({ name:"", email:"", message:"" });
      const [status, setStatus] = useState(null);
      const [loading, setLoading] = useState(false);

      const handleSubmit = async () => {
        if (!form.name || !form.email || !form.message) return;
        setLoading(true);
        try {
          const res = await fetch(API + "/contact", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(form)
          });
          const data = await res.json();
          setStatus(data.success ? "Message sent! I'll be in touch." : "Saved locally (backend offline).");
        } catch {
          setStatus("Message saved locally — backend not running.");
        }
        setForm({ name:"", email:"", message:"" });
        setLoading(false);
      };

      return (
        <section id="contact">
          <div className="section-label">// 03 — connect</div>
          <h2 className="section-title">Get In Touch</h2>
          <div className="contact-wrapper">
            <div className="contact-info">
              <h3>Let's build something together.</h3>
              <p>Open to freelance projects, full-time roles, and interesting collaborations. Drop me a message and I'll get back within 24 hours.</p>
              <div style={{marginTop:"2rem", display:"flex", flexDirection:"column", gap:"0.8rem"}}>
                {[["Email","alex@devportfolio.io"],["Location","Remote / Worldwide"],["Status","Available for work"]].map(([l,v])=>(
                  <div key={l} style={{display:"flex",gap:"1rem",fontSize:"0.8rem"}}>
                    <span style={{color:"var(--muted)",minWidth:80}}>{l}</span>
                    <span>{v}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="contact-form">
              <div className="form-group">
                <label>Name</label>
                <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Your name"/>
              </div>
              <div className="form-group">
                <label>Email</label>
                <input value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="you@example.com"/>
              </div>
              <div className="form-group">
                <label>Message</label>
                <textarea value={form.message} onChange={e=>setForm({...form,message:e.target.value})} placeholder="Tell me about your project..."/>
              </div>
              {status && <div className="success-msg">{status}</div>}
              <button className="btn-primary" onClick={handleSubmit} disabled={loading}>
                {loading ? "Sending..." : "Send Message →"}
              </button>
            </div>
          </div>
        </section>
      );
    }

    // ── ARCH BANNER ──
    function ArchBanner() {
      return (
        <div className="arch-banner">
          <span style={{color:"var(--text)",fontSize:"0.8rem",fontFamily:"'Syne',sans-serif",fontWeight:600}}>3-Tier Architecture</span>
          <div className="arch-item"><div className="arch-dot dot-frontend"></div>React Frontend</div>
          <span style={{color:"var(--border)"}}>→</span>
          <div className="arch-item"><div className="arch-dot dot-backend"></div>Node.js + Express API</div>
          <span style={{color:"var(--border)"}}>→</span>
          <div className="arch-item"><div className="arch-dot dot-database"></div>Python + PostgreSQL DB</div>
        </div>
      );
    }

    // ── APP ──
    function App() {
      const [active, setActive] = useState("hero");

      useEffect(() => {
        const el = document.getElementById(active);
        if (el) el.scrollIntoView({ behavior:"smooth" });
      }, [active]);

      return (
        <>
          <Nav active={active} setActive={setActive} />
          <ArchBanner />
          <Hero setActive={setActive} />
          <Projects />
          <Skills />
          <Contact />
          <footer>Built with React · Node.js · Python · PostgreSQL — 3-Tier Portfolio</footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
